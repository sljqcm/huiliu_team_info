<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>灰硫班组信息</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f4f8;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;padding:2rem 1rem;text-align:center}
.header h1{font-size:2rem;font-weight:700;margin-bottom:0.5rem}
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:500;cursor:pointer;border:none;margin:0.25rem}
.btn-primary{background:#fff;color:#1e3a5f}
.btn-secondary{background:rgba(255,255,255,0.2);color:#fff}
.container{max-width:900px;margin:0 auto;padding:1rem}
.tree-wrap{position:relative;padding-left:2rem}
.tree-wrap::before{content:'';position:absolute;left:0.5rem;top:0;bottom:0;width:2px;background:rgba(59,130,246,0.3)}
.tree-node{position:relative;margin-bottom:1rem}
.tree-node::before{content:'';position:absolute;left:-1.5rem;top:1.5rem;width:1rem;height:2px;background:rgba(59,130,246,0.3)}
.tree-node-dot{position:absolute;left:-1.7rem;top:1.35rem;width:0.75rem;height:0.75rem;border-radius:50%;background:#fff;border:3px solid #3b82f6}
.card{background:#fff;border-radius:1rem;box-shadow:0 4px 6px rgba(0,0,0,0.1);overflow:hidden}
.card-header{background:#1e3a5f;color:#fff;padding:1rem;display:flex;justify-content:space-between;align-items:center}
.card-header h2{font-size:1.25rem}
.card-body{padding:1rem}
.item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.75rem;margin-bottom:0.5rem;position:relative}
.item:hover .item-actions{opacity:1}
.item-actions{position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);opacity:0;transition:opacity 0.2s}
.btn-icon{padding:0.5rem;border-radius:0.375rem;border:none;cursor:pointer}
.btn-edit{background:#dbeafe;color:#3b82f6}
.btn-delete{background:#fee2e2;color:#ef4444}
.btn-add{width:100%;padding:0.75rem;border:2px dashed #e2e8f0;background:transparent;border-radius:0.5rem;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center;gap:0.5rem}
.btn-add:hover{border-color:#3b82f6;background:#eff6ff;color:#3b82f6}
.person-card{display:flex;align-items:center;justify-content:space-between;padding:1rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:0.5rem;margin-bottom:0.5rem}
.person-info{display:flex;align-items:center;gap:1rem}
.avatar{width:48px;height:48px;background:#3b82f6;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:1rem}
.modal-content{background:#fff;border-radius:1rem;width:100%;max-width:400px;overflow:hidden}
.modal-header{background:#1e3a5f;color:#fff;padding:1rem;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:1rem}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-weight:500;margin-bottom:0.25rem;color:#475569}
.form-input{width:100%;padding:0.75rem;border:1px solid #e2e8f0;border-radius:0.5rem;font-size:1rem}
.form-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.modal-footer{padding:1rem;display:flex;gap:0.5rem}
.btn-cancel{flex:1;padding:0.75rem;border-radius:0.5rem;background:#e2e8f0;color:#64748b;border:none;cursor:pointer}
.btn-save{flex:1;padding:0.75rem;border-radius:0.5rem;background:#3b82f6;color:#fff;border:none;cursor:pointer}
.theme-btn{display:block;width:100%;padding:1rem;border-radius:0.5rem;border:2px solid transparent;margin-bottom:0.5rem;cursor:pointer;font-weight:500;transition:all 0.2s}
.theme-btn.active{border-color:#3b82f6;transform:scale(1.02)}
.hidden{display:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
const state = {
  modules: JSON.parse(localStorage.getItem('huiliu-modules')) || [
    {id:'1',title:'工作范围',type:'standard',items:[
      {id:'1-1',content:'负责脱硫脱硝系统的日常运行与维护'},
      {id:'1-2',content:'监控烟气排放指标，确保达标'},
      {id:'1-3',content:'处理脱硫剂的制备与供应'},
      {id:'1-4',content:'配合检修工作，完成系统消缺'}
    ]},
    {id:'2',title:'人员架构',type:'personnel',items:[],persons:[
      {id:'2-1',name:'张伟',position:'班长',contact:'13800138001'},
      {id:'2-2',name:'李强',position:'副班长',contact:'13800138002'},
      {id:'2-3',name:'王磊',position:'操作员',contact:'13800138003'},
      {id:'2-4',name:'赵鹏',position:'操作员',contact:'13800138004'}
    ]},
    {id:'3',title:'工作理念',type:'standard',items:[
      {id:'3-1',content:'安全第一，预防为主'},
      {id:'3-2',content:'精益求精，追求卓越'},
      {id:'3-3',content:'团结协作，共同进步'},
      {id:'3-4',content:'节能减排，绿色发展'}
    ]},
    {id:'4',title:'班前会',type:'standard',items:[
      {id:'4-1',content:'检查人员到岗情况，确认精神状态',date:'2024-01-15'},
      {id:'4-2',content:'通报当班任务和注意事项',date:'2024-01-15'}
    ]},
    {id:'5',title:'班后会',type:'standard',items:[
      {id:'5-1',content:'总结当班工作完成情况',date:'2024-01-14'},
      {id:'5-2',content:'汇报异常情况和处理措施',date:'2024-01-14'}
    ]},
    {id:'6',title:'违章记录',type:'standard',items:[
      {id:'6-1',content:'李强：未按规定佩戴安全帽，已整改',date:'2024-01-10'}
    ]},
    {id:'7',title:'奖惩记录',type:'standard',items:[
      {id:'7-1',content:'张伟：月度优秀员工，奖励500元',date:'2024-01-01'},
      {id:'7-2',content:'班组：季度安全先进班组，奖励2000元',date:'2024-01-01'}
    ]}
  ],
  themes: [
    {id:'blue',name:'工业蓝',primary:'#1e3a5f',secondary:'#3b82f6',bg:'#f0f4f8'},
    {id:'orange',name:'活力橙',primary:'#c2410c',secondary:'#f97316',bg:'#fff7ed'},
    {id:'green',name:'清新绿',primary:'#166534',secondary:'#22c55e',bg:'#f0fdf4'},
    {id:'purple',name:'科技紫',primary:'#581c87',secondary:'#a855f7',bg:'#faf5ff'}
  ],
  currentTheme: JSON.parse(localStorage.getItem('huiliu-theme')) || {id:'blue',name:'工业蓝',primary:'#1e3a5f',secondary:'#3b82f6',bg:'#f0f4f8'}
};

function save() {
  localStorage.setItem('huiliu-modules', JSON.stringify(state.modules));
  localStorage.setItem('huiliu-theme', JSON.stringify(state.currentTheme));
}

function genId() { return Math.random().toString(36).substr(2,9); }

function render() {
  const t = state.currentTheme;
  document.body.style.background = t.bg;
  
  let html = `
  <div class="header" style="background:linear-gradient(135deg,${t.primary},${t.secondary})">
    <h1>灰硫班组信息</h1>
    <p style="opacity:0.8;margin-bottom:1rem">脱硫脱硝班组管理平台</p>
    <button class="btn btn-primary" onclick="showAddModule()">+ 添加大项</button>
    <button class="btn btn-secondary" onclick="showThemes()">🎨 切换皮肤</button>
    <button class="btn btn-secondary" onclick="exportData()">⬇️ 导出数据</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">⬆️ 导入数据</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
  <div class="container">
    <div class="tree-wrap">`;

  state.modules.forEach(m => {
    const icon = m.type === 'personnel' ? '👥' : '📋';
    html += `<div class="tree-node"><div class="tree-node-dot"></div><div class="card">
      <div class="card-header" style="background:${t.primary}">
        <h2>${icon} ${m.title}</h2>
        <button class="btn-icon" style="background:rgba(255,255,255,0.2);color:#fff" onclick="deleteModule('${m.id}')">🗑️</button>
      </div>
      <div class="card-body">`;
    
    if (m.type === 'personnel') {
      (m.persons || []).forEach(p => {
        html += `<div class="person-card">
          <div class="person-info">
            <div class="avatar" style="background:${t.secondary}">${p.name.charAt(0)}</div>
            <div>
              <div style="font-weight:600">${p.name}</div>
              <div style="font-size:0.875rem;color:#64748b">${p.position}</div>
              <div style="font-size:0.75rem;color:#94a3b8">📞 ${p.contact}</div>
            </div>
          </div>
          <button class="btn-icon btn-delete" onclick="deletePerson('${m.id}','${p.id}')">🗑️</button>
        </div>`;
      });
      html += `<button class="btn-add" onclick="showAddPerson('${m.id}')">+ 添加人员</button>`;
    } else {
      m.items.forEach(item => {
        html += `<div class="item">
          <div>${item.content}${item.date ? `<span style="font-size:0.75rem;color:#94a3b8;margin-left:0.5rem">${item.date}</span>` : ''}</div>
        </div>`;
      });
      html += `<button class="btn-add" onclick="showAddItem('${m.id}')">+ 添加子项</button>`;
    }
    
    html += `</div></div></div>`;
  });

  html += `</div></div>`;
  document.getElementById('app').innerHTML = html;
  document.body.style.background = t.bg;
}

function showThemes() {
  const t = state.currentTheme;
  let html = `<div class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header" style="background:${t.primary}">
        <h3>选择皮肤</h3>
        <button class="btn-icon" style="background:transparent;color:#fff" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">`;
  
  state.themes.forEach(th => {
    const active = th.id === state.currentTheme.id ? 'active' : '';
    html += `<button class="theme-btn ${active}" style="background:${th.bg};color:${th.primary}" onclick="setTheme('${th.id}')">${th.name}</button>`;
  });
  
  html += `</div></div></div>`;
  document.getElementById('app').innerHTML = html;
}

function setTheme(id) {
  state.currentTheme = state.themes.find(t => t.id === id);
  save();
  render();
}

function showAddModule() {
  const t = state.currentTheme;
  const html = `<div class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header" style="background:${t.primary}">
        <h3>添加大项</h3>
        <button class="btn-icon" style="background:transparent;color:#fff" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">名称</label>
          <input type="text" id="moduleTitle" class="form-input" placeholder="请输入大项名称">
        </div>
        <div class="form-group">
          <label class="form-label">类型</label>
          <select id="moduleType" class="form-input">
            <option value="standard">普通模块</option>
            <option value="personnel">人员模块</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" style="background:${t.secondary}" onclick="addModule()">添加</button>
      </div>
    </div>
  </div>`;
  document.getElementById('app').innerHTML = html;
}

function addModule() {
  const title = document.getElementById('moduleTitle').value.trim();
  const type = document.getElementById('moduleType').value;
  if (!title) return;
  state.modules.push({id:genId(),title,type,items:[],persons:type==='personnel'?[]:undefined});
  save();
  render();
}

function deleteModule(id) {
  if (confirm('确定删除此模块？')) {
    state.modules = state.modules.filter(m => m.id !== id);
    save();
    render();
  }
}

function showAddItem(moduleId) {
  const t = state.currentTheme;
  const html = `<div class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header" style="background:${t.primary}">
        <h3>添加子项</h3>
        <button class="btn-icon" style="background:transparent;color:#fff" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">内容</label>
          <textarea id="itemContent" class="form-input" rows="3" placeholder="请输入内容"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">日期（可选）</label>
          <input type="date" id="itemDate" class="form-input">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" style="background:${t.secondary}" onclick="addItem('${moduleId}')">添加</button>
      </div>
    </div>
  </div>`;
  document.getElementById('app').innerHTML = html;
}

function addItem(moduleId) {
  const content = document.getElementById('itemContent').value.trim();
  const date = document.getElementById('itemDate').value;
  if (!content) return;
  const m = state.modules.find(m => m.id === moduleId);
  if (m) {
    m.items.push({id:genId(),content,date:date||undefined});
    save();
  }
  render();
}

function showAddPerson(moduleId) {
  const t = state.currentTheme;
  const html = `<div class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header" style="background:${t.primary}">
        <h3>添加人员</h3>
        <button class="btn-icon" style="background:transparent;color:#fff" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input type="text" id="personName" class="form-input" placeholder="请输入姓名">
        </div>
        <div class="form-group">
          <label class="form-label">职位</label>
          <input type="text" id="personPosition" class="form-input" placeholder="请输入职位">
        </div>
        <div class="form-group">
          <label class="form-label">联系方式</label>
          <input type="text" id="personContact" class="form-input" placeholder="请输入联系方式">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" style="background:${t.secondary}" onclick="addPerson('${moduleId}')">添加</button>
      </div>
    </div>
  </div>`;
  document.getElementById('app').innerHTML = html;
}

function addPerson(moduleId) {
  const name = document.getElementById('personName').value.trim();
  const position = document.getElementById('personPosition').value.trim();
  const contact = document.getElementById('personContact').value.trim();
  if (!name) return;
  const m = state.modules.find(m => m.id === moduleId);
  if (m) {
    if (!m.persons) m.persons = [];
    m.persons.push({id:genId(),name,position,contact});
    save();
  }
  render();
}

function deletePerson(moduleId, personId) {
  const m = state.modules.find(m => m.id === moduleId);
  if (m && m.persons) {
    m.persons = m.persons.filter(p => p.id !== personId);
    save();
    render();
  }
}

function closeModal(e) {
  if (!e || e.target.classList.contains('modal')) render();
}

function exportData() {
  const data = {
    version: 1,
    exportDate: new Date().toISOString(),
    modules: state.modules,
    currentThemeId: state.currentTheme.id
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const dateStr = new Date().toLocaleDateString('zh-CN').replace(/\//g, '-');
  a.download = '灰硫班组信息_' + dateStr + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.modules && Array.isArray(data.modules)) {
        state.modules = data.modules;
        if (data.currentThemeId) {
          const th = state.themes.find(t => t.id === data.currentThemeId);
          if (th) state.currentTheme = th;
        }
        save();
        render();
        alert('导入成功！');
      } else {
        alert('文件格式不正确');
      }
    } catch(err) {
      alert('文件解析失败，请确认是有效的JSON文件');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

render();
</script>
</body>
</html>
