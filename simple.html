<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>灰硫班组信息</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.container{max-width:80rem;margin:0 auto;padding:1rem .75rem;flex:1;width:100%}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;margin-bottom:1.25rem;border-radius:1rem;box-shadow:0 10px 30px -10px rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-logo{display:flex;align-items:center;gap:.75rem}
.logo-box{width:3rem;height:3rem;border-radius:1rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.25rem;box-shadow:0 4px 12px rgba(249,115,22,.25)}
.nav-title{font-weight:700;font-size:1.5rem;line-height:1.1}
.nav-sub{font-size:.875rem;opacity:.6}
.nav-actions{display:flex;align-items:center;gap:.5rem}
.btn{display:inline-flex;align-items:center;gap:.375rem;padding:.5rem .75rem;border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer;border:none;transition:transform .2s}
.btn-primary{color:#fff;box-shadow:0 4px 12px rgba(249,115,22,.3)}
.btn-icon{width:2.25rem;height:2.25rem;padding:0;justify-content:center;border-radius:.5rem}
.btn-icon:hover{transform:scale(1.1)}
.page-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding:.75rem 1.5rem;margin-bottom:1.25rem;border-radius:1rem;box-shadow:0 10px 30px -10px rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.page-title{display:flex;align-items:center;gap:.5rem;font-size:1.25rem;font-weight:700}
.badge{font-size:.75rem;padding:.15rem .5rem;border-radius:.375rem;font-weight:500}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.card-list{display:flex;flex-direction:column;gap:.75rem}
.module-card{border-radius:1rem;overflow:hidden;transition:all .3s;box-shadow:0 10px 30px -10px rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer}
.module-card:hover{transform:translateY(-2px);box-shadow:0 20px 40px -10px rgba(0,0,0,.15)}
.module-card.expanded{transform:translateY(-2px);box-shadow:0 20px 40px -10px rgba(0,0,0,.15)}
.card-head{position:relative;padding:14px 20px;overflow:hidden}
.card-topbar{position:absolute;top:0;left:0;right:0;height:4px}
.card-glow{position:absolute;top:-24px;right:-24px;width:60px;height:60px;border-radius:50%;opacity:.2}
.card-head-inner{position:relative;display:flex;align-items:center;justify-content:space-between;gap:.75rem;padding-top:4px}
.card-icon-box{width:36px;height:36px;border-radius:.75rem;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.125rem;flex-shrink:0;box-shadow:0 2px 8px rgba(249,115,22,.3)}
.card-info{min-width:0;flex:1}
.card-title{font-weight:700;font-size:1.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.card-count{font-size:.75rem;opacity:.7;margin-top:.125rem}
.card-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.chevron{transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.card-body{padding:12px 16px 16px;border-top:1px solid rgba(255,255,255,.5);animation:slideDown .25s ease-out}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.item-list{display:flex;flex-direction:column;gap:.5rem}
.item-block{border-radius:.75rem;padding:.75rem;display:flex;align-items:flex-start;gap:.75rem;transition:all .2s;cursor:pointer}
.item-block:hover{transform:translateX(2px)}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:8px}
.item-expand{flex-shrink:0;padding:.25rem;border-radius:.375rem;font-size:.875rem;display:flex;align-items:center;justify-content:center}
.item-content{flex:1;min-width:0}
.item-text{font-size:.875rem;font-weight:500;line-height:1.4}
.item-date{font-size:.75rem;opacity:.6;margin-top:.25rem;display:flex;align-items:center;gap:.25rem}
.item-actions{display:flex;gap:.25rem;flex-shrink:0;opacity:0;transition:opacity .2s}
.item-block:hover .item-actions{opacity:1}
.item-btn{width:1.75rem;height:1.75rem;border-radius:.5rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem}
.add-child-form,.add-item-form{margin-top:.5rem;padding:.75rem;border-radius:.75rem;border:1px dashed rgba(249,115,22,.3);background:rgba(249,115,22,.05)}
.add-child-form p{font-size:.75rem;opacity:.7;margin-bottom:.5rem}
input[type=text],input[type=date],textarea{width:100%;padding:.5rem .75rem;border-radius:.5rem;border:1px solid rgba(249,115,22,.2);background:#fff;font-size:.875rem;margin-bottom:.5rem;outline:none}
input:focus,textarea:focus{border-color:#f97316}
.form-actions{display:flex;gap:.5rem}
.form-actions button{flex:1;padding:.5rem;border-radius:.5rem;border:none;cursor:pointer;font-size:.875rem;font-weight:500}
.btn-submit{color:#fff}
.btn-cancel{background:rgba(249,115,22,.1);color:#f97316}
.add-btn{width:100%;padding:.625rem;border-radius:.75rem;border:2px dashed rgba(249,115,22,.3);background:transparent;color:#f97316;cursor:pointer;font-size:.875rem;font-weight:500;transition:all .2s;margin-top:.75rem}
.add-btn:hover{border-style:solid;background:rgba(249,115,22,.05)}
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem}
.person-card{position:relative;border-radius:.75rem;padding:.75rem;overflow:hidden;border:1px solid rgba(249,115,22,.2);background:rgba(249,115,22,.08)}
.person-card-glow{position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#f97316,transparent 70%);opacity:.2}
.person-top{position:relative;display:flex;align-items:center;gap:.75rem}
.person-avatar{width:2.5rem;height:2.5rem;border-radius:.75rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;background:linear-gradient(135deg,#b45309,#f97316);box-shadow:0 2px 8px rgba(249,115,22,.3);flex-shrink:0}
.person-name{font-weight:600;font-size:.9rem}
.person-pos{font-size:.75rem;opacity:.7;margin-top:.125rem}
.person-actions{position:absolute;top:.5rem;right:.5rem;display:flex;gap:.25rem;opacity:0;transition:opacity .2s}
.person-card:hover .person-actions{opacity:1}
.person-contact{position:relative;font-size:.75rem;opacity:.8;margin-top:.5rem;padding-top:.5rem;border-top:1px solid rgba(249,115,22,.15);display:flex;align-items:center;gap:.25rem}
.empty-text{text-align:center;padding:1.5rem;border-radius:.75rem;font-size:.875rem;opacity:.5}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-box{width:100%;max-width:420px;border-radius:1rem;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.modal-head{padding:1rem 1.5rem;color:#fff;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1.125rem;font-weight:700}
.modal-close{background:none;border:none;color:#fff;opacity:.8;cursor:pointer;font-size:1.25rem}
.modal-body{padding:1.5rem}
.modal-body h4{font-size:.95rem;font-weight:600;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0}
.switch{position:relative;width:2.75rem;height:1.5rem;border-radius:9999px;cursor:pointer;transition:background .2s}
.switch-knob{position:absolute;top:2px;left:2px;width:1.05rem;height:1.05rem;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.switch.on .switch-knob{transform:translateX(20px)}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem}
.theme-btn{padding:.75rem;border-radius:.75rem;border:2px solid transparent;cursor:pointer;color:#fff;font-size:.875rem;font-weight:500;transition:transform .2s}
.theme-btn:hover{transform:scale(1.05)}
.theme-btn.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3)}
.mode-btns{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem}
.mode-btn{padding:.75rem;border-radius:.75rem;border:2px solid;cursor:pointer;font-size:.875rem;font-weight:500;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s}
.slider-wrap{display:flex;align-items:center;gap:.75rem}
.slider{flex:1;height:.5rem;border-radius:9999px;-webkit-appearance:none;appearance:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:1rem;height:1rem;border-radius:50%;background:#f97316;cursor:pointer}
.slider-val{width:3rem;text-align:center;font-size:.875rem;font-weight:500}
.modal-footer{padding:0 1.5rem 1.5rem}
.modal-footer button{width:100%;padding:.75rem;border-radius:.75rem;border:none;color:#fff;font-weight:500;cursor:pointer;font-size:.9rem}
footer{text-align:center;padding:.75rem 1rem;border-top:1px solid rgba(255,255,255,.5);color:rgba(120,53,15,.6);font-size:.875rem;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);margin-top:auto}
footer a{color:#f97316;text-decoration:none}
.hidden{display:none!important}
@media(max-width:640px){.nav-title{font-size:1.15rem}.nav-sub{display:none}.hidden-sm{display:none!important}.card-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const THEMES = {
  'warm-light': {
    name: '暖白明', primary: '#b45309', secondary: '#f97316',
    bg: '#fffbeb', card: '#ffffff', text: '#78350f', border: 'rgba(254,215,170,.6)',
    dark: false
  },
  'warm-dark': {
    name: '暖茶暗', primary: '#451a03', secondary: '#d97706',
    bg: '#1c1410', card: '#291f1a', text: '#fef3c7', border: 'rgba(217,119,6,.3)',
    dark: true
  },
  'classic-blue': {
    name: '经典蓝', primary: '#1e3a5f', secondary: '#3b82f6',
    bg: '#f0f4f8', card: '#ffffff', text: '#1e293b', border: 'rgba(203,213,225,.6)',
    dark: false
  }
};
const genId = () => Math.random().toString(36).slice(2, 11);

const STORAGE_KEY = 'huiliu-team-simple';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    themeId: 'warm-light',
    settings: { scale: 1, glassEffect: true, animation: true, cardMode: 'grid' },
    modules: [
      {id:'1',title:'工作范围',type:'standard',items:[
        {id:'1-1',content:'负责脱硫脱硝系统的日常运行与维护',children:[
          {id:'1-1-1',content:'脱硫塔巡检与记录',children:[]},
          {id:'1-1-2',content:'脱硝系统参数监控',children:[]}
        ],collapsed:false},
        {id:'1-2',content:'监控烟气排放指标，确保达标',children:[
          {id:'1-2-1',content:'SO2浓度实时监测',children:[]},
          {id:'1-2-2',content:'NOx排放数据记录',children:[]},
          {id:'1-2-3',content:'颗粒物浓度检测',children:[]}
        ],collapsed:false},
        {id:'1-3',content:'处理脱硫剂的制备与供应',children:[]},
        {id:'1-4',content:'配合检修工作，完成系统消缺',children:[]}
      ]},
      {id:'2',title:'人员架构',type:'personnel',items:[],persons:[
        {id:'p1',name:'张伟',position:'班长',contact:'13800138001'},
        {id:'p2',name:'李强',position:'副班长',contact:'13800138002'},
        {id:'p3',name:'王磊',position:'操作员',contact:'13800138003'},
        {id:'p4',name:'赵鹏',position:'操作员',contact:'13800138004'}
      ]},
      {id:'3',title:'工作理念',type:'standard',items:[
        {id:'3-1',content:'安全第一，预防为主',children:[]},
        {id:'3-2',content:'精益求精，追求卓越',children:[]},
        {id:'3-3',content:'团结协作，共同进步',children:[]},
        {id:'3-4',content:'节能减排，绿色发展',children:[]}
      ]},
      {id:'4',title:'班前会',type:'standard',items:[
        {id:'4-1',content:'检查人员到岗情况，确认精神状态',date:'2024-01-15',children:[]},
        {id:'4-2',content:'通报当班任务和注意事项',date:'2024-01-15',children:[]},
        {id:'4-3',content:'强调安全风险点和防控措施',date:'2024-01-15',children:[]}
      ]},
      {id:'5',title:'班后会',type:'standard',items:[
        {id:'5-1',content:'总结当班工作完成情况',date:'2024-01-14',children:[]},
        {id:'5-2',content:'汇报异常情况和处理措施',date:'2024-01-14',children:[]},
        {id:'5-3',content:'提出改进建议和注意事项',date:'2024-01-14',children:[]}
      ]},
      {id:'6',title:'违章记录',type:'standard',items:[
        {id:'6-1',content:'李强：未按规定佩戴安全帽，已整改',date:'2024-01-10',children:[]}
      ]},
      {id:'7',title:'奖惩记录',type:'standard',items:[
        {id:'7-1',content:'张伟：月度优秀员工，奖励500元',date:'2024-01-01',children:[]},
        {id:'7-2',content:'班组：季度安全先进班组，奖励2000元',date:'2024-01-01',children:[]}
      ]}
    ],
    expandedId: null
  };
}

let state = loadState();

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    themeId: state.themeId,
    settings: state.settings,
    modules: state.modules
  }));
}

function t() { return THEMES[state.themeId]; }

function setTheme(id) { state.themeId = id; saveState(); render(); }
function updateSettings(patch) { state.settings = { ...state.settings, ...patch }; saveState(); render(); }

function addModule(title, type) {
  state.modules.push({ id: genId(), title, type, items: [], persons: type==='personnel'?[]:undefined });
  saveState(); render();
}
function deleteModule(id) {
  if(!confirm('确定删除整个模块？')) return;
  state.modules = state.modules.filter(m => m.id !== id);
  if(state.expandedId === id) state.expandedId = null;
  saveState(); render();
}

function addSubItemToTree(items, parentId, newItem) {
  if(parentId === null) return [...items, newItem];
  return items.map(item => {
    if(item.id === parentId) return { ...item, children: [...(item.children||[]), newItem], collapsed: false };
    if(item.children) return { ...item, children: addSubItemToTree(item.children, parentId, newItem) };
    return item;
  });
}
function deleteSubItemFromTree(items, itemId) {
  return items.filter(i => i.id !== itemId).map(i => i.children ? { ...i, children: deleteSubItemFromTree(i.children, itemId) } : i);
}
function updateSubItemInTree(items, itemId, patch) {
  return items.map(i => {
    if(i.id === itemId) return { ...i, ...patch };
    if(i.children) return { ...i, children: updateSubItemInTree(i.children, itemId, patch) };
    return i;
  });
}
function toggleSubItemInTree(items, itemId) {
  return items.map(i => {
    if(i.id === itemId) return { ...i, collapsed: !i.collapsed };
    if(i.children) return { ...i, children: toggleSubItemInTree(i.children, itemId) };
    return i;
  });
}

function addSubItem(moduleId, parentId, content, date) {
  const mod = state.modules.find(m => m.id === moduleId);
  if(!mod || !content.trim()) return;
  const newItem = { id: genId(), content: content.trim(), children: [] };
  if(date) newItem.date = date;
  mod.items = addSubItemToTree(mod.items, parentId, newItem);
  saveState(); render();
}
function deleteSubItem(moduleId, itemId) {
  if(!confirm('确定删除该项及其子项？')) return;
  const mod = state.modules.find(m => m.id === moduleId);
  if(!mod) return;
  mod.items = deleteSubItemFromTree(mod.items, itemId);
  saveState(); render();
}
function toggleSubItem(moduleId, itemId) {
  const mod = state.modules.find(m => m.id === moduleId);
  if(!mod) return;
  mod.items = toggleSubItemInTree(mod.items, itemId);
  saveState();
  // 只更新该模块内容，不重渲染整个页面
  const bodyEl = document.querySelector(`[data-module-body="${moduleId}"]`);
  if(bodyEl) bodyEl.innerHTML = renderModuleBody(mod);
}

function addPerson(moduleId, name, position, contact) {
  const mod = state.modules.find(m => m.id === moduleId);
  if(!mod || !name.trim()) return;
  mod.persons.push({ id: genId(), name: name.trim(), position: position.trim(), contact: contact.trim() });
  saveState(); render();
}
function deletePerson(moduleId, personId) {
  if(!confirm('确定删除该人员？')) return;
  const mod = state.modules.find(m => m.id === moduleId);
  if(!mod) return;
  mod.persons = mod.persons.filter(p => p.id !== personId);
  saveState(); render();
}

function toggleModule(id) {
  state.expandedId = state.expandedId === id ? null : id;
  saveState();
  render();
}

function exportData() {
  const data = { modules: state.modules, currentThemeId: state.themeId, settings: state.settings };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `huiliu-team-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(e) {
  const file = e.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(data.modules) state.modules = data.modules;
      if(data.currentThemeId && THEMES[data.currentThemeId]) state.themeId = data.currentThemeId;
      if(data.settings) state.settings = { ...state.settings, ...data.settings };
      saveState();
      render();
      alert('导入成功！');
    } catch {
      alert('导入失败：文件格式错误');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function renderSubItem(item, moduleId, depth = 0) {
  const th = t();
  const hasChildren = item.children && item.children.length > 0;
  const isCollapsed = item.collapsed;
  let html = `<div class="item-block" style="margin-left:${depth*24}px;background:${th.dark?'rgba(255,255,255,.05)':th.secondary+'0a'};border:1px solid ${th.dark?'rgba(255,255,255,.1)':th.secondary+'30'}">`;
  if(hasChildren) {
    html += `<button class="item-expand" style="background:${th.secondary}20;color:${th.secondary}" onclick="event.stopPropagation();toggleSubItem('${moduleId}','${item.id}')">${isCollapsed?'▶':'▼'}</button>`;
  } else {
    html += `<div class="item-dot" style="background:${th.secondary}"></div>`;
  }
  html += `<div class="item-content" style="color:${th.text}">
    <div class="item-text">${item.content}</div>
    ${item.date ? `<div class="item-date">📅 ${item.date}</div>` : ''}
  </div>`;
  html += `<div class="item-actions">
    <button class="item-btn" style="background:${th.secondary}20;color:${th.secondary}" onclick="event.stopPropagation();openAddChild('${moduleId}','${item.id}')" title="添加子项">+</button>
    <button class="item-btn" style="background:rgba(239,68,68,.15);color:#ef4444" onclick="event.stopPropagation();deleteSubItem('${moduleId}','${item.id}')" title="删除">🗑</button>
  </div>`;
  html += `</div>`;
  // 添加子项表单
  if(state.addingChild?.moduleId === moduleId && state.addingChild?.parentId === item.id) {
    html += `<div class="add-child-form" style="margin-left:${depth*24}px">
      <p style="color:${th.text}">添加子子项到：${item.content}</p>
      <input type="text" id="addChildInput" placeholder="输入内容..." onkeydown="if(event.key==='Enter')doAddChild('${moduleId}','${item.id}')">
      <input type="date" id="addChildDate">
      <div class="form-actions">
        <button class="btn-submit" style="background:${th.secondary}" onclick="doAddChild('${moduleId}','${item.id}')">添加</button>
        <button class="btn-cancel" onclick="closeAddChild()">取消</button>
      </div>
    </div>`;
  }
  // 子子项
  if(hasChildren && !isCollapsed) {
    html += `<div style="margin-top:.5rem;display:flex;flex-direction:column;gap:.5rem">`;
    item.children.forEach(child => {
      html += renderSubItem(child, moduleId, depth + 1);
    });
    html += `</div>`;
  }
  return html;
}

function renderModuleBody(mod) {
  const th = t();
  let html = '';
  if(mod.type === 'standard') {
    if(mod.items.length === 0) {
      html += `<div class="empty-text" style="background:${th.dark?'rgba(255,255,255,.03)':th.secondary+'05'};color:${th.text}50">暂无子项，点击下方按钮添加</div>`;
    } else {
      html += `<div class="item-list">`;
      mod.items.forEach(item => { html += renderSubItem(item, mod.id, 0); });
      html += `</div>`;
    }
    html += `<button class="add-btn" onclick="showAddItem('${mod.id}')">＋ 添加子项</button>`;
    if(state.addItemModuleId === mod.id) {
      html += `<div class="add-item-form">
        <input type="text" id="addItemInput" placeholder="输入子项内容..." onkeydown="if(event.key==='Enter')doAddItem('${mod.id}')">
        <input type="date" id="addItemDate">
        <div class="form-actions">
          <button class="btn-submit" style="background:${th.secondary}" onclick="doAddItem('${mod.id}')">添加</button>
          <button class="btn-cancel" onclick="closeAddItem()">取消</button>
        </div>
      </div>`;
    }
  } else {
    const persons = mod.persons || [];
    if(persons.length === 0) {
      html += `<div class="empty-text" style="background:${th.dark?'rgba(255,255,255,.03)':th.secondary+'05'};color:${th.text}50">暂无人员，点击下方按钮添加</div>`;
    } else {
      html += `<div class="person-grid">`;
      persons.forEach(p => {
        html += `<div class="person-card">
          <div class="person-card-glow"></div>
          <div class="person-actions">
            <button class="item-btn" style="background:rgba(239,68,68,.15);color:#ef4444" onclick="deletePerson('${mod.id}','${p.id}')">🗑</button>
          </div>
          <div class="person-top">
            <div class="person-avatar">${p.name.charAt(0)}</div>
            <div>
              <div class="person-name" style="color:${th.text}">${p.name}</div>
              <div class="person-pos" style="color:${th.text}">${p.position}</div>
            </div>
          </div>
          <div class="person-contact" style="color:${th.text}">📞 ${p.contact}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `<button class="add-btn" onclick="showAddPerson('${mod.id}')">＋ 添加人员</button>`;
    if(state.addPersonModuleId === mod.id) {
      html += `<div class="add-item-form">
        <input type="text" id="addPersonName" placeholder="姓名">
        <input type="text" id="addPersonPos" placeholder="职位">
        <input type="text" id="addPersonContact" placeholder="联系方式">
        <div class="form-actions">
          <button class="btn-submit" style="background:${th.secondary}" onclick="doAddPerson('${mod.id}')">添加</button>
          <button class="btn-cancel" onclick="closeAddPerson()">取消</button>
        </div>
      </div>`;
    }
  }
  return html;
}

function showAddItem(moduleId) { state.addItemModuleId = moduleId; render(); }
function closeAddItem() { state.addItemModuleId = null; render(); }
function doAddItem(moduleId) {
  const content = document.getElementById('addItemInput')?.value || '';
  const date = document.getElementById('addItemDate')?.value || '';
  addSubItem(moduleId, null, content, date);
  state.addItemModuleId = null;
  render();
}

function openAddChild(moduleId, parentId) { state.addingChild = { moduleId, parentId }; render(); setTimeout(()=>document.getElementById('addChildInput')?.focus(),0); }
function closeAddChild() { state.addingChild = null; render(); }
function doAddChild(moduleId, parentId) {
  const content = document.getElementById('addChildInput')?.value || '';
  const date = document.getElementById('addChildDate')?.value || '';
  addSubItem(moduleId, parentId, content, date);
  state.addingChild = null;
  render();
}

function showAddPerson(moduleId) { state.addPersonModuleId = moduleId; render(); }
function closeAddPerson() { state.addPersonModuleId = null; render(); }
function doAddPerson(moduleId) {
  const name = document.getElementById('addPersonName')?.value || '';
  const pos = document.getElementById('addPersonPos')?.value || '';
  const contact = document.getElementById('addPersonContact')?.value || '';
  addPerson(moduleId, name, pos, contact);
  state.addPersonModuleId = null;
  render();
}

function showAddModule() { state.showAddMod = true; render(); }
function closeAddModule() { state.showAddMod = false; render(); }
function doAddModule(type) {
  const input = document.getElementById('addModInput');
  const title = input?.value?.trim();
  if(!title) return;
  addModule(title, type);
  state.showAddMod = false;
  render();
}

function showSettings() { state.showSettings = true; render(); }
function closeSettings() { state.showSettings = false; render(); }

function render() {
  const th = t();
  document.body.style.background = th.bg;
  document.body.style.color = th.text;

  const s = state.settings;
  const cardW = 260 * s.scale;
  const listMode = s.cardMode === 'list';

  let html = `<div class="container">
    <nav class="navbar" style="background:${th.dark?'rgba(30,24,20,.92)':'rgba(255,255,255,.92)'};border-color:${th.border}">
      <div class="nav-logo">
        <div class="logo-box" style="background:linear-gradient(135deg,${th.primary},${th.secondary})">灰</div>
        <div>
          <div class="nav-title" style="color:${th.text}">灰硫班组信息</div>
          <div class="nav-sub" style="color:${th.text}">脱硫脱硝班组管理平台</div>
        </div>
      </div>
      <div class="nav-actions">
        <button class="btn btn-primary" style="background:linear-gradient(135deg,${th.primary},${th.secondary})" onclick="showAddModule()">＋ <span class="hidden-sm">添加大项</span></button>
        <button class="btn btn-icon" style="background:${th.secondary}20;color:${th.secondary}" onclick="showSettings()" title="设置">⚙</button>
        <button class="btn btn-icon hidden-sm" style="background:${th.secondary}20;color:${th.secondary}" onclick="exportData()" title="导出数据">⬇</button>
        <label class="btn btn-icon hidden-sm" style="background:${th.secondary}20;color:${th.secondary};cursor:pointer" title="导入数据">
          ⬆<input type="file" accept=".json" style="display:none" onchange="importData(event)">
        </label>
      </div>
    </nav>

    <div class="page-header" style="background:${th.dark?'rgba(255,255,255,.08)':'rgba(255,255,255,.85)'};border-color:${th.border}">
      <div class="page-title" style="color:${th.text}">
        📋 模块总览
        <span class="badge" style="background:${th.secondary}20;color:${th.secondary}">共 ${state.modules.length} 个</span>
      </div>
      <div style="font-size:.875rem;opacity:.6;color:${th.text}">点击卡片展开查看详情</div>
    </div>

    <div class="${listMode ? 'card-list' : 'card-grid'}" style="${listMode ? '' : `grid-template-columns:repeat(auto-fill,minmax(${cardW}px,1fr))`}">`;

  state.modules.forEach(mod => {
    const isExpanded = state.expandedId === mod.id;
    const count = mod.type === 'personnel' ? (mod.persons||[]).length : mod.items.length;
    const icon = mod.type === 'personnel' ? '👥' : '📋';
    const label = mod.type === 'personnel' ? '人员' : '内容';
    const countLabel = mod.type === 'personnel' ? '成员' : '条目';

    html += `<div class="module-card ${isExpanded?'expanded':''}" style="background:${th.dark?'rgba(255,255,255,.08)':'rgba(255,255,255,.85)'};border-color:${th.border}" onclick="toggleModule('${mod.id}')">
      <div class="card-head">
        <div class="card-topbar" style="background:linear-gradient(90deg,${th.primary},${th.secondary})"></div>
        <div class="card-glow" style="background:radial-gradient(circle,${th.secondary},transparent 70%)"></div>
        <div class="card-head-inner">
          <div style="display:flex;align-items:center;gap:.75rem;min-width:0;flex:1">
            <div class="card-icon-box" style="background:linear-gradient(135deg,${th.primary},${th.secondary})">${icon}</div>
            <div class="card-info">
              <div class="card-title" style="color:${th.text}">${mod.title}</div>
              <div class="card-count" style="color:${th.text}">${count} 个${countLabel}</div>
            </div>
          </div>
          <div class="card-right">
            <span class="badge" style="background:${th.secondary}20;color:${th.secondary}">${label}</span>
            <div class="chevron ${isExpanded?'open':''}" style="color:${th.secondary};font-size:1rem">▼</div>
          </div>
        </div>
      </div>
      ${isExpanded ? `<div class="card-body" data-module-body="${mod.id}" style="border-color:${th.border}">${renderModuleBody(mod)}</div>` : ''}
    </div>`;
  });

  html += `</div></div>`;

  // 页脚
  html += `<footer style="border-color:${th.border};background:${th.dark?'rgba(255,255,255,.05)':'rgba(255,255,255,.85)'};color:${th.text}80">
    Copyright © 2026 灰硫班组信息 |
    <a href="https://github.com/sljqcm/huiliu_team_info" target="_blank">GitHub Repository</a>
  </footer>`;

  // 添加模块弹窗
  if(state.showAddMod) {
    html += `<div class="modal" onclick="if(event.target===this)closeAddModule()">
      <div class="modal-box" style="background:${th.card}">
        <div class="modal-head" style="background:linear-gradient(135deg,${th.primary},${th.secondary})">
          <div class="modal-title">添加大项</div>
          <button class="modal-close" onclick="closeAddModule()">✕</button>
        </div>
        <div class="modal-body">
          <input type="text" id="addModInput" placeholder="输入模块名称..." onkeydown="if(event.key==='Enter')doAddModule('standard')" style="background:${th.dark?'rgba(255,255,255,.05)':'#f8fafc'};border-color:${th.border};color:${th.text}">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.5rem">
            <button class="btn-submit" style="background:${th.secondary};padding:.75rem;border-radius:.75rem;color:#fff;border:none;cursor:pointer;font-weight:500" onclick="doAddModule('standard')">📋 内容模块</button>
            <button class="btn-submit" style="background:${th.secondary};padding:.75rem;border-radius:.75rem;color:#fff;border:none;cursor:pointer;font-weight:500" onclick="doAddModule('personnel')">👥 人员模块</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // 设置弹窗
  if(state.showSettings) {
    html += `<div class="modal" onclick="if(event.target===this)closeSettings()">
      <div class="modal-box" style="background:${th.card}">
        <div class="modal-head" style="background:linear-gradient(135deg,${th.primary},${th.secondary})">
          <div class="modal-title">设置</div>
          <button class="modal-close" onclick="closeSettings()">✕</button>
        </div>
        <div class="modal-body" style="color:${th.text}">
          <h4>🎨 主题选择</h4>
          <div class="theme-grid">`;
    Object.entries(THEMES).forEach(([id, theme]) => {
      html += `<button class="theme-btn ${state.themeId===id?'active':''}" style="background:linear-gradient(135deg,${theme.primary},${theme.secondary})" onclick="setTheme('${id}')">${theme.name}</button>`;
    });
    html += `</div>
          <h4>📐 面板模式</h4>
          <div class="mode-btns">
            <button class="mode-btn" style="border-color:${s.cardMode==='grid'?th.secondary:th.border};background:${s.cardMode==='grid'?th.secondary+'15':'transparent'};color:${th.text}" onclick="updateSettings({cardMode:'grid'})">⊞ 网格布局</button>
            <button class="mode-btn" style="border-color:${s.cardMode==='list'?th.secondary:th.border};background:${s.cardMode==='list'?th.secondary+'15':'transparent'};color:${th.text}" onclick="updateSettings({cardMode:'list'})">≡ 列表布局</button>
          </div>
          <h4>🔍 卡片大小</h4>
          <div class="slider-wrap">
            <span style="font-size:.8rem;opacity:.6">小</span>
            <input type="range" class="slider" min="0.7" max="1.5" step="0.1" value="${s.scale}" oninput="updateSettings({scale:parseFloat(this.value)})" style="background:${th.border}">
            <span style="font-size:.8rem;opacity:.6">大</span>
            <span class="slider-val" style="color:${th.secondary}">${Math.round(s.scale*100)}%</span>
          </div>
          <h4 style="margin-top:1rem">✨ 视觉效果</h4>
          <div class="setting-row">
            <span style="font-size:.9rem">毛玻璃效果</span>
            <div class="switch ${s.glassEffect?'on':''}" style="background:${s.glassEffect?th.secondary:th.border}" onclick="updateSettings({glassEffect:!${s.glassEffect}})">
              <div class="switch-knob"></div>
            </div>
          </div>
          <div class="setting-row">
            <span style="font-size:.9rem">动画效果</span>
            <div class="switch ${s.animation?'on':''}" style="background:${s.animation?th.secondary:th.border}" onclick="updateSettings({animation:!${s.animation}})">
              <div class="switch-knob"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button style="background:linear-gradient(135deg,${th.primary},${th.secondary})" onclick="closeSettings()">完成</button>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML = html;
}

render();
</script>
</body>
</html>
